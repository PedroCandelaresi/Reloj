name: STARNET — Validate

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: starnet-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-stack:
    name: Build backend + frontend
    runs-on: [self-hosted, linux, X64, relojdeploy]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mostrar versión de Docker
        run: |
          docker --version
          docker compose version

      - name: Validar build del stack
        working-directory: infra/docker
        run: docker compose --env-file .env.example build --pull backend frontend
