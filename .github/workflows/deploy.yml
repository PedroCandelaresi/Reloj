name: STARNET — Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: starnet-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & run stack
    runs-on: [self-hosted, linux, X64, reloj]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Verificar .env
        working-directory: infra/docker
        run: |
          if [ -f .env ]; then
            echo ".env presente en el runner — se usa tal cual."
          else
            echo "ERROR: No existe .env en infra/docker/. Crealo manualmente en el VPS antes de deployar." >&2
            exit 1
          fi

      - name: Mostrar versión de Docker
        run: |
          docker --version
          docker compose version

      - name: Build de imágenes
        working-directory: infra/docker
        run: docker compose build --pull

      - name: Levantar Postgres
        working-directory: infra/docker
        run: docker compose up -d postgres

      - name: Esperar Postgres healthy
        run: |
          until [ "$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' reloj-conflunet-postgres 2>/dev/null)" = "healthy" ]; do
            echo "Esperando a Postgres..."
            sleep 2
          done

      - name: Ejecutar migraciones
        working-directory: infra/docker
        run: docker compose run --rm backend npm run migration:run:prod

      - name: Levantar stack
        working-directory: infra/docker
        run: docker compose up -d --remove-orphans

      - name: Estado de los contenedores
        working-directory: infra/docker
        run: docker compose ps

      - name: Limpieza de imágenes viejas
        run: docker image prune -f
