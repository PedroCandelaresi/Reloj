version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zkdashboard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zkuser
      POSTGRES_PASSWORD: zkpassword
      POSTGRES_DB: zkdashboard
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
