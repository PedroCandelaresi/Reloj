services:
  postgres:
    image: postgres:16-alpine
    container_name: zkdashboard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zkuser
      POSTGRES_PASSWORD: zkpassword
      POSTGRES_DB: zkdashboard
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zkdashboard_backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      PORT: 4370
      LOG_DIR: /home/reloj/log
    ports:
      - '4370:4370'
    volumes:
      - backend_logs:/home/reloj/log

volumes:
  postgres_data:
  backend_logs:
