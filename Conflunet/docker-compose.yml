services:
  postgres:
    image: postgres:16-alpine
    container_name: zkdashboard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zkuser
      POSTGRES_PASSWORD: zkpassword
      POSTGRES_DB: zkdashboard
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zkuser -d zkdashboard']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zkdashboard_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      PORT: 4370
      LOG_DIR: /home/reloj/log
      ATTENDANCE_ATTACHMENTS_DIR: /home/reloj/attachments
    ports:
      - '4370:4370'
    volumes:
      - backend_logs:/home/reloj/log
      - attendance_attachments:/home/reloj/attachments
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const socket = require('net').connect({ host: '127.0.0.1', port: 4370 }); socket.on('connect', () => { socket.end(); process.exit(0); }); socket.on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  backend_logs:
  attendance_attachments:
