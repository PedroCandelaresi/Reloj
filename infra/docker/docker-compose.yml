# STARNET — orquestación completa (db + backend + frontend)
#
# Uso:
#   cd infra/docker
#   cp .env.example .env      # ajustar valores
#   docker compose up -d --build
#
# Para rebuildear un solo servicio:
#   docker compose up -d --build backend
#
# El contexto de build es la raíz del repo (../..) para que los Dockerfiles
# puedan copiar desde zkdashboard/{backend,frontend}.

services:
  postgres:
    image: postgres:16-alpine
    container_name: starnet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starnet

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    image: starnet-backend:latest
    container_name: starnet-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 4370
      LOG_DIR: ${LOG_DIR:-/home/reloj/log}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - '${BACKEND_PORT:-4370}:4370'
    volumes:
      - /home/reloj/log:/home/reloj/log
    networks:
      - starnet

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
    image: starnet-frontend:latest
    container_name: starnet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      API_URL: ${INTERNAL_API_URL:-http://backend:4370}
    ports:
      - '${FRONTEND_PORT:-4200}:4200'
    networks:
      - starnet

volumes:
  postgres_data:
  backend_logs:

networks:
  starnet:
    driver: bridge
