# ═════════════════════════════════════════════════════════════════════════════
#  STARNET — Nginx reverse proxy para el77.nqn.net.ar
#
#  Rutas:
#    /              → frontend Next.js   (127.0.0.1:4200)
#    /api/          → backend NestJS     (127.0.0.1:4201)
#    /iclock        → backend ADMS       (127.0.0.1:4201)  ← reloj biométrico
#
#  Este archivo sólo define el server HTTP (puerto 80). El bloque HTTPS lo
#  va a agregar automáticamente certbot con `--nginx` cuando generes los
#  certificados (ver instrucciones al final).
# ═════════════════════════════════════════════════════════════════════════════

upstream starnet_frontend {
    server 127.0.0.1:4200;
    keepalive 32;
}

upstream starnet_backend {
    server 127.0.0.1:4201;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name el77.nqn.net.ar;

    access_log /var/log/nginx/el77.nqn.net.ar.access.log;
    error_log  /var/log/nginx/el77.nqn.net.ar.error.log warn;

    client_max_body_size 10m;

    # ── /iclock → backend ADMS (reloj biométrico) ─────────────────────────
    # Se mantiene por HTTP plano porque muchos relojes ZKTeco/MB360 no soportan
    # SNI/TLS moderno. Cuando certbot agregue el redirect a HTTPS abajo, esta
    # location tiene que seguir accesible sobre HTTP → dejarla ANTES de que
    # certbot inserte el bloque de redirect.
    location /iclock {
        proxy_pass http://starnet_backend;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
    }

    # ── /api/ → backend NestJS (strip del /api al pasar al upstream) ──────
    location /api/ {
        proxy_pass http://starnet_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout  60s;
    }

    # ── / → frontend Next.js ──────────────────────────────────────────────
    location / {
        proxy_pass http://starnet_frontend;
        proxy_http_version 1.1;

        # Websockets (Next.js HMR, server actions con streaming)
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  60s;
    }
}
